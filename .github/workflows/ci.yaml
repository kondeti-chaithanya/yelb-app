name: Build and Deploy Yelb App

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}

    # 🔐 Login to ECR
    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2

    # 🏗️ Build & Push yelb-ui
    - name: Build & Push yelb-ui
      run: |
        docker build -t yelb-ui ./yelb-ui
        docker tag yelb-ui:latest ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/yelb-ui:latest
        docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/yelb-ui:latest

    # 🏗️ Build & Push appserver
    - name: Build & Push yelb-appserver
      run: |
        docker build -t yelb-appserver ./yelb-appserver
        docker tag yelb-appserver:latest ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/yelb-appserver:latest
        docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/yelb-appserver:latest

    # 🚀 Deploy CloudFormation
    - name: Deploy CloudFormation
      run: |
        aws cloudformation deploy \
          --template-file iac/base-infra-cfn.yaml \
          --stack-name yelb-stack \
          --capabilities CAPABILITY_NAMED_IAM \
          --no-fail-on-empty-changeset

    # ⏳ Wait
    - name: Wait for stack
      run: |
        aws cloudformation wait stack-create-complete \
          --stack-name yelb-stack || \
        aws cloudformation wait stack-update-complete \
          --stack-name yelb-stack

    # 🌐 Output URL
    - name: Get URL
      run: |
        aws cloudformation describe-stacks \
          --stack-name yelb-stack \
          --query "Stacks[0].Outputs"