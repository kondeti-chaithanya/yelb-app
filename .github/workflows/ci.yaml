name: Deploy Yelb App to ECS (Prebuilt Images)

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # ✅ Checkout code
    - name: Checkout Code
      uses: actions/checkout@v4

    # 🔐 Configure AWS (OIDC)
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}

    # 🧹 Delete failed stack if exists
    - name: Delete failed stack (if exists)
      run: |
        aws cloudformation delete-stack --stack-name yelb-stack || true
        aws cloudformation wait stack-delete-complete --stack-name yelb-stack || true

    # 🚀 Deploy CloudFormation (uses prebuilt images)
    - name: Deploy CloudFormation
      run: |
        aws cloudformation deploy \
          --template-file iac/base-infra-cfn.yaml \
          --stack-name yelb-stack \
          --capabilities CAPABILITY_NAMED_IAM \
          --no-fail-on-empty-changeset

    # ⏳ Wait for stack creation/update
    - name: Wait for stack completion
      run: |
        aws cloudformation wait stack-create-complete \
          --stack-name yelb-stack || \
        aws cloudformation wait stack-update-complete \
          --stack-name yelb-stack

    # 🌐 Get Load Balancer URL
    - name: Get Application URL
      run: |
        aws cloudformation describe-stacks \
          --stack-name yelb-stack \
          --query "Stacks[0].Outputs"

    # 🔍 Debug if failure
    - name: Debug CloudFormation Events
      if: failure()
      run: |
        aws cloudformation describe-stack-events \
          --stack-name yelb-stack